<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flowchart Generator | Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
</head>
<body class="dashboard-mode">
    <!-- Three.js Background Canvas -->
    <canvas id="canvas-bg"></canvas>

    <!-- Dashboard Container -->
    <div class="dashboard-container">
        <!-- Left Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-content">
                <!-- TOP SECTION: User Profile -->
                <div class="sidebar-section sidebar-top">
                    <div class="user-profile-card">
                        <div class="profile-avatar-large">
                            <span class="avatar-text">EN</span>
                        </div>
                        <div class="profile-details">
                            <p class="profile-username">User Profile</p>
                            <p class="profile-status">● Online</p>
                        </div>
                    </div>
                </div>

                <!-- MIDDLE SECTION: Pathway Logs / History -->
                <div class="sidebar-section sidebar-middle">
                    <div class="history-header">
                        <span class="history-icon">📂</span>
                        <span class="history-title">Recent Flowcharts</span>
                    </div>
                    <div class="history-list">
                    </div>
                </div>

                <!-- BOTTOM SECTION: Actions & Settings -->
                <div class="sidebar-section sidebar-bottom">
                    <div class="actions-list">
                        <a href="#" class="action-item">
                            <span class="action-icon">⚙</span>
                            <span class="action-text">Settings</span>
                        </a>
                        <a href="index.html" class="action-item logout-link">
                            <span class="action-icon">↪</span>
                            <span class="action-text">Log Out</span>
                        </a>
                    </div>
                </div>
            </div>
            <div class="sidebar-border"></div>
        </aside>

        <!-- Main Workspace Section -->
        <main class="workspace-main">
            <!-- Top Bar -->
            <div class="workspace-topbar">
                <div class="topbar-title">
                    <span class="topbar-icon">◆</span>
                    <h2>Flowchart Generator</h2>
                </div>
                <div class="topbar-status">
                    <span class="status-indicator"></span>
                    <span class="status-text">System Online</span>
                </div>
            </div>

            <!-- Workspace Content -->
            <div class="workspace-content">
                <!-- Left Panel (Console & Tabs) -->
                <div class="workspace-panel-left">
                    <!-- Prompt Console Card -->
                    <div class="prompt-console-dashboard">
                        <div class="console-content">
                            <div class="console-header">
                                <div class="console-icon"></div>
                                <span class="console-label">Flowchart Generator</span>
                            </div>

                            <div class="prompt-input-group">
                                <label class="prompt-input-label">Describe Your Flowchart</label>
                                <textarea id="flowchart-prompt" class="prompt-textarea" placeholder="Describe the flowchart you want to generate. Be specific about the process, decision points, and desired outcomes..."></textarea>
                            </div>

                            <div class="prompt-action">
                                <button id="generate-pathways-btn" class="prompt-btn">Generate Flowchart</button>
                                <button class="prompt-btn secondary">Clear</button>
                            </div>
                        </div>
                    </div>

                    <!-- Pathway Tabs -->
                    <div class="pathway-tabs-section">
                        <div class="tabs-header">
                            <span class="tabs-label">Results</span>
                        </div>
                        <div class="pathway-tabs-bar" id="solution-tabs-bar">
                            <!-- Tabs are dynamically created by dashboard.js -->
                        </div>
                    </div>
                </div>

                <!-- Right Panel (Canvas) -->
                <div class="workspace-panel-right">
                    <!-- Canvas Container -->
                    <div class="canvas-section">
                        <div class="canvas-header">
                            <span class="canvas-label">Flowchart Canvas</span>
                        </div>
                        <div class="canvas-card-3d">
                            <div id="flowchart-canvas" class="canvas-container-dashboard">
                                <div class="canvas-empty">Ready to render flowcharts...</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Ambient Glow Effect -->
    <div class="ambient-glow"></div>

    <!-- Scripts -->
    <script src="dashboard.js"></script>
</body>
</html>
